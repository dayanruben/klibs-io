tasks:
  generateGitProperties:
    action: !org.kotlintoolchain.plugin.gitcommitid.generateGitProperties
      moduleRootDir: ${module.rootDir}
      propertiesFile: ${taskOutputDir}/${pluginSettings.propertiesFile}
      settings: ${pluginSettings}

generated:
  resources:
    - directory: ${tasks.generateGitProperties.action.propertiesFile}
