databaseChangeLog:
  - changeSet:
      id: create readme_metadata table
      author: zofia.zuzanna.wiora@jetbrains.com
      comment: KTL-4224 Fix links with bad signatures in readme
      changes:
        - createTable:
            tableName: readme_metadata
            columns:
              - column:
                  name: id
                  type: SERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: scm_repo_id
                  type: INT
                  constraints:
                    unique: true
                    references:
                      tableName: scm_repo
                      columnNames: [ id ]
                    foreignKeyName: fk_readme_metadata_scm_repo_id
              - column:
                  name: last_synced_at
                  type: TIMESTAMP
                  defaultValueDate: "1970-01-01 00:00:00"
                  constraints:
                    nullable: false
              - column:
                  name: last_processed_at
                  type: TIMESTAMP
                  defaultValueDate: "1970-01-01 00:00:00"
                  constraints:
                    nullable: false
  - changeSet:
      id: populate readme_metadata table
      author: zofia.zuzanna.wiora@jetbrains.com
      changes:
        - sql:
            sql: |
              INSERT INTO readme_metadata (scm_repo_id)
              SELECT id
              FROM scm_repo
              WHERE has_readme = true;