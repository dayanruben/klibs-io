product: jvm/lib

apply:
  - ../../build-logic/templates/persistence.module-template.yaml
  - ../../build-logic/templates/maven-indexer.module-template.yaml

dependencies:
  - $kotlin.serialization.json: exported
  - $libs.bucket4j
  - $libs.jackson.dataformat.xml: exported
  - $libs.kotlin.toolingMetadata: exported
  - $libs.maven.model: exported
  - $libs.spring.webflux
  - $libs.xml.util: exported

test-dependencies:
  - $libs.mockito.kotlin

settings:
  kotlin:
    serialization: enabled
